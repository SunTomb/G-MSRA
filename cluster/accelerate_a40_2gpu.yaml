# Accelerate config for 2× A40 multi-GPU training on Tang nodes
# Usage: accelerate launch --config_file cluster/accelerate_a40_2gpu.yaml scripts/train_phase1_rl.py ...
compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
downcast_bf16: 'no'
gpu_ids: all
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 2
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
